<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PokeTeam Builder</title>

    <link rel="stylesheet" href="../css/trainer.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
</head>

<body>

<div class="container">

    <header>

        <button class="backButton">← Voltar</button>

        <div class="teamTitle">
            <h1>Time Competitivo</h1>
            
        </div>

    </header>

    <section class="pokemonGrid">

        <div class="pokemonCard">
            <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/6.png">
            <h2>Charizard</h2>
            <p>Fire • Flying</p>
            <span>Lv.100</span>
        </div>

        <div class="pokemonCard">
            <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/25.png">
            <h2>Pikachu</h2>
            <p>Electric</p>
            <span>Lv.90</span>
        </div>

        <div class="pokemonCard empty">
            +
        </div>

        <div class="pokemonCard empty">
            +
        </div>

        <div class="pokemonCard empty">
            +
        </div>

        <div class="pokemonCard empty">
            +
        </div>

    </section>

    <div class="buttons">

        <button class="primary">
            Adicionar Pokémon
        </button>

        <button class="secondary">
            Salvar Time
        </button>

    </div>

</div>

</body>
</html>
